# Coolify Optimized Docker Compose
# Use this file for Coolify deployments
# All environment variables can be configured in Coolify UI

services:
  mongodb:
    image: mongo:7
    container_name: togglely-mongodb
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    environment:
      MONGO_INITDB_DATABASE: togglely
    volumes:
      - mongodb_data:/data/db
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    healthcheck:
      test: echo "try { rs.status() } catch (err) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }" | mongosh --port 27017 --quiet
      interval: 5s
      timeout: 30s
      retries: 30
      start_period: 0s
      start_interval: 1s
    networks:
      - togglely-network

  redis:
    image: redis:7-alpine
    container_name: togglely-redis
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flagify-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: togglely-backend
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: ${DATABASE_URL:-mongodb://mongodb:27017/togglely?replicaSet=rs0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${BACKEND_PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    networks:
      - flagify-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: togglely-frontend
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://backend:4000}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - flagify-network

volumes:
  mongodb_data:
  redis_data:
  uploads:

networks:
  togglely-network:
    driver: bridge
